name: Update Version

on:
  push:
    paths:
      - "*.zip"

jobs:
  update-version:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate Version
        run: echo $(date +%s) > version.txt

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add version.txt
          git commit -m "Update version" || exit 0
          git push
